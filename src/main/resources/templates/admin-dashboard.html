<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>dashboard</title>
        <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}">
    </head>
    <body>
        <nav class="navbar">
            <a href="/admin/tasks">Tasks</a>
            <a href="/admin/projects">Projects</a>
            <a href="/admin/users">Users</a>
            <a href="/logout">LogOut</a>
        </nav>
        <div class="container">
            <div class="header">
                <h1>Task Summary</h1>
                <a th:href="@{/admin/create_task}" class="create-btn">
                + Create Task
                </a>
            </div>
            <div class="filter-container">

                <form method="get"
                      th:action="@{/admin/tasks}"
                      class="filter-form">
            
                    <!-- Status -->
                    <select name="status">
                        <option value="">All Status</option>
            
                        <option value="PENDING"
                                th:selected="${param.status == 'PENDING'}">
                            Pending
                        </option>
            
                        <option value="COMPLETED"
                                th:selected="${param.status == 'COMPLETED'}">
                            Completed
                        </option>
            
                        <option value="APPROVED"
                                th:selected="${param.status == 'APPROVED'}">
                            Approved
                        </option>
                    </select>
            
                    <!-- Projects -->
                    <select name="projectName">
            
                        <option value="">All Projects</option>
            
                        <option th:each="project : ${projects}"
                                th:value="${project}"
                                th:text="${project}"
                                th:selected="${param.projectName != null and param.projectName[0] == project}">
                        </option>
            
                    </select>
            
                    <!-- Users -->
                    <select name="userName">
            
                        <option value="">All Users</option>
            
                        <option th:each="user : ${users}"
                                th:value="${user}"
                                th:text="${user}"
                                th:selected="${param.userName != null and param.userName[0] == user}">
                        </option>
            
                    </select>
            
                    <!-- Overdue -->
                    <label class="checkbox-group">
            
                        <input type="checkbox"
                               name="overdue"
                               value="true"
                               th:checked="${param.overdue != null}">
            
                        Overdue
            
                    </label>
            
                    <!-- Filter Button -->
                    <button type="submit" class="filter-btn">
                        Filter
                    </button>
            
                    <!-- Clear Filters -->
                    <a th:href="@{/admin/tasks}" class="clear-btn">
                        Clear Filters
                    </a>
            
                </form>
            
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Task ID</th>
                        <th>Task Name</th>
                        <th>Assigned To</th>
                        <th>Due date</th>
                        <th>Project</th>
                        <th>Status</th>
                        <th>Update</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="task : ${tasks}">
                        <td th:text="${task.id}"></td>
                        <td th:text="${task.title}"></td>
                        <td th:text="${task.assignedTo}"></td>
                        <td th:text="${task.dueDate}"></td>
                        <td th:text="${task.project}"></td>
                        <td th:text="${task.status}"></td>
                        <td> 
                            <form th:action="@{/admin/update_task/{id}(id=${task.id})}" method="get">
                                <button type="submit">update</button>
                            </form>
                        </td>
                        <td> 
                            <form th:action="@{/admin/delete_task/{id}(id=${task.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this task?');">
                                <button type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
     </body>
</html>
