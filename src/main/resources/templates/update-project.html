<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta type="viewport" content="width=device-width, initial-scale=1.0">
        <title>document</title>
        <link rel="stylesheet" th:href="@{/css/create-project.css}">
    </head>
    <body>
       <div class="container">
            <h1>Create Project</h1>
           <form id="updateProjectForm" th:action="@{/admin/update_project/{id}(id=${project.id})}" method="post">
            <div class="input-group">
                <input placeholder="Enter project name" type="text" name="title" th:value="${project.name}" required>
            </div>
            <div class="input-group">
                <input placeholder="Enter description" type="text" name="description" th:value="${project.description}" required>     
            </div>
            <button type="submit" class="button">Update</button>
           </form>
       </div>
    </body>
</html>
